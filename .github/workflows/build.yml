name: Build & Sign

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install tools
        run: |
          brew install ldid dpkg 2>&1 || true
          which ldid && ldid 2>&1 || echo "ldid not found"
          which dpkg-deb && dpkg-deb --version || echo "dpkg-deb not found"
          xcodebuild -version
          clang --version | head -1

      - name: Debug Theos
        run: |
          echo "THEOS=$THEOS"
          ls -la $THEOS/makefiles/
          ls -la $THEOS/vendor/
          make --version | head -1

      - name: Build Package
        run: |
          make package 2>&1

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: packages/*.deb
