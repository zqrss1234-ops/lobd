name: Build & Sign

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install ldid
        run: brew install ldid

      - name: Build Package
        run: make package

      - name: Show build output
        if: failure()
        run: |
          ls -la .theos/ 2>/dev/null || true
          find . -name "*.log" -type f 2>/dev/null | while read f; do echo "=== LOG: $f ==="; cat "$f"; done
          find . -name "*.o" -type f 2>/dev/null | head -5
          echo "=== ENV ==="
          env | grep -i theos

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: packages/*.deb
