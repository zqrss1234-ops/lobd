name: Build & Sign

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install ldid
        run: brew install ldid

      - name: Build Package
        run: |
          make package 2>&1 | tee /tmp/build_output.txt; exit ${PIPESTATUS[0]}

      - name: Show build output
        if: failure()
        run: |
          echo "=== BUILD OUTPUT ==="
          cat /tmp/build_output.txt 2>/dev/null || echo "No build output file"
          echo "=== THEOS LOGS ==="
          find $HOME/theos -name "*.log" -type f 2>/dev/null | while read f; do echo "--- $f ---"; cat "$f"; done
          echo "=== CURRENT DIR ==="
          find . -name "*.log" -type f 2>/dev/null | while read f; do echo "--- $f ---"; cat "$f"; done

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: packages/*.deb
