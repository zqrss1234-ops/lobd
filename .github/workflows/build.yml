name: Build & Sign

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install ldid
        run: brew install ldid

      - name: Build Package
        run: make package 2>&1
        continue-on-error: true

      - name: Show build output
        if: always()
        run: ls -la .theos/ 2>/dev/null; find . -name "*.log" -exec echo "FILE: {}" \; -exec cat {} \;; find . -name "*.pl" -exec echo "PREPROC: {}" \;

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: packages/*.deb
